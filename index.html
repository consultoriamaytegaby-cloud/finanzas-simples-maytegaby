<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas Simples</title>
<script src="https://cdn.emailjs.com/dist/email.min.js"></script>
<script>
  // Inicializa EmailJS
  (function(){
    emailjs.init("YOUR_PUBLIC_KEY"); // Reemplaza con tu Public Key de EmailJS
  })();
</script>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background:#f5f5f5; }
  input, select, textarea, button { margin: 5px 0; padding: 8px; width: 100%; max-width:400px; }
  button { cursor: pointer; background:#4CAF50; color:white; border:none; border-radius:4px; }
  h2 { color:#333; }
  .container { background:white; padding:20px; border-radius:8px; max-width:600px; margin:auto; box-shadow:0 0 10px rgba(0,0,0,0.1); }
</style>
</head>
<body>

<div class="container">
  <h2>Bienvenido a Finanzas Simples</h2>
  
  <div id="step1">
    <h3>1️⃣ Captura tus datos</h3>
    <input type="text" id="name" placeholder="Tu nombre" required>
    <input type="email" id="email" placeholder="Tu correo" required>
    <input type="month" id="month" placeholder="Mes a registrar" required>
    <button onclick="saveUserData()">Siguiente</button>
  </div>

  <div id="step2" style="display:none;">
    <h3>2️⃣ Ingresa tus ingresos</h3>
    <input type="text" id="incomeSource" placeholder="Fuente de ingreso">
    <input type="number" id="incomeAmount" placeholder="Monto">
    <button onclick="addIncome()">Agregar ingreso</button>
    <ul id="incomeList"></ul>
    <button onclick="nextStep()">Siguiente</button>
  </div>

  <div id="step3" style="display:none;">
    <h3>3️⃣ Ingresa tus gastos</h3>
    <input type="text" id="expenseSource" placeholder="Concepto de gasto">
    <input type="number" id="expenseAmount" placeholder="Monto">
    <button onclick="addExpense()">Agregar gasto</button>
    <ul id="expenseList"></ul>
    <button onclick="showSummary()">Ver resumen</button>
  </div>

  <div id="step4" style="display:none;">
    <h3>4️⃣ Resumen y plan de acción</h3>
    <p id="summary"></p>
    <textarea id="actionPlan" placeholder="Escribe tu plan de acción"></textarea>
    <button onclick="sendEmail()">Enviar correo</button>
    <button onclick="downloadCSV()">Descargar en Excel</button>
  </div>
</div>

<script>
  window.userData = {};
  window.incomes = [];
  window.expenses = [];

  function saveUserData() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const month = document.getElementById('month').value;

    if(!name || !email || !month) { alert('Por favor llena todos los campos'); return; }

    window.userData = { name, email, month };
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
  }

  function addIncome() {
    const source = document.getElementById('incomeSource').value.trim();
    const amount = parseFloat(document.getElementById('incomeAmount').value);

    if(!source || isNaN(amount)) { alert('Llena correctamente el ingreso'); return; }

    window.incomes.push({ source, amount });
    const li = document.createElement('li');
    li.textContent = `${source}: $${amount.toFixed(2)}`;
    document.getElementById('incomeList').appendChild(li);

    document.getElementById('incomeSource').value = '';
    document.getElementById('incomeAmount').value = '';
  }

  function nextStep() {
    document.getElementById('step2').style.display = 'none';
    document.getElementById('step3').style.display = 'block';
  }

  function addExpense() {
    const source = document.getElementById('expenseSource').value.trim();
    const amount = parseFloat(document.getElementById('expenseAmount').value);

    if(!source || isNaN(amount)) { alert('Llena correctamente el gasto'); return; }

    window.expenses.push({ source, amount });
    const li = document.createElement('li');
    li.textContent = `${source}: $${amount.toFixed(2)}`;
    document.getElementById('expenseList').appendChild(li);

    document.getElementById('expenseSource').value = '';
    document.getElementById('expenseAmount').value = '';
  }

  function calculateBalance() {
    const totalIncome = window.incomes.reduce((sum,i)=>sum+i.amount,0);
    const totalExpense = window.expenses.reduce((sum,e)=>sum+e.amount,0);
    return totalIncome - totalExpense;
  }

  function showSummary() {
    const balance = calculateBalance();
    let summaryText = `<strong>Mes:</strong> ${window.userData.month}<br>`;
    summaryText += `<strong>Total ingresos:</strong> $${window.incomes.reduce((sum,i)=>sum+i.amount,0).toFixed(2)}<br>`;
    summaryText += `<strong>Total gastos:</strong> $${window.expenses.reduce((sum,e)=>sum+e.amount,0).toFixed(2)}<br>`;
    summaryText += `<strong>Balance:</strong> $${balance.toFixed(2)}`;
    
    document.getElementById('summary').innerHTML = summaryText;
    document.getElementById('step3').style.display = 'none';
    document.getElementById('step4').style.display = 'block';
  }

  function sendEmail() {
    const templateParams = {
      user_name: window.userData.name,
      user_email: window.userData.email,
      month: window.userData.month,
      incomes: JSON.stringify(window.incomes),
      expenses: JSON.stringify(window.expenses),
      balance: calculateBalance(),
      plan: document.getElementById('actionPlan').value
    };

    emailjs.send('YOUR_SERVICE_ID', 'YOUR_TEMPLATE_ID', templateParams)
      .then(() => alert('Correo enviado con éxito!'))
      .catch(err => alert('Error al enviar correo: ' + err));
  }

  function downloadCSV() {
    let csv = 'Tipo,Concepto,Monto\n';
    window.incomes.forEach(i => csv += `Ingreso,${i.source},${i.amount}\n`);
    window.expenses.forEach(e => csv += `Gasto,${e.source},${e.amount}\n`);
    
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `finanzas_${window.userData.name}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
